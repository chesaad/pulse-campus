# Values du chart argo-rollouts.
# Référence : https://github.com/argoproj/argo-helm/tree/main/charts/argo-rollouts
#
# Étape 5 du poly.

# Active le dashboard Web et l'expose via ingress sur rollouts.devhub.local.
dashboard:
  enabled: true
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - rollouts.devhub.local
    paths:
      - /
    pathType: Prefix

# Active le service de notifications utilisé en étape 10. Chaque rollout
# terminé notifie : succès -> webhook "rollout-success" (3e webhook dédié),
# échec/abort -> webhook "primary" (même destination que les alertes
# Prometheus severity:page — un abort de rollout mérite la même urgence
# qu'une dégradation qui réveille à 3h du matin).
notifications:
  # Une clé "service.webhook.<nom>" par webhook nommé — et non un seul
  # "service.webhook" contenant une map de plusieurs entrées, qui produisait
  # un appel avec une URL vide ("unsupported protocol scheme ''", constaté
  # dans les logs du contrôleur) : le moteur de notifications attend un
  # service distinct par clé, pas une collection sous une clé unique.
  notifiers:
    service.webhook.primary: |
      url: http://webhook-mock.monitoring.svc.cluster.local:8080/primary
    service.webhook.rollout-success: |
      url: http://webhook-mock.monitoring.svc.cluster.local:8080/rollout-success
  templates:
    template.rollout-completed: |
      message: |
        Rollout {{.rollout.metadata.name}} (ns {{.rollout.metadata.namespace}}) : {{.rollout.status.phase}}. Image active : {{(index .rollout.spec.template.spec.containers 0).image}}.
      webhook:
        rollout-success:
          method: POST
          body: |
            {"rollout":"{{.rollout.metadata.name}}","namespace":"{{.rollout.metadata.namespace}}","phase":"{{.rollout.status.phase}}","image":"{{(index .rollout.spec.template.spec.containers 0).image}}"}
    template.rollout-aborted: |
      message: |
        Rollout {{.rollout.metadata.name}} (ns {{.rollout.metadata.namespace}}) ABORTED — retour à la version stable. Image : {{(index .rollout.spec.template.spec.containers 0).image}}.
      webhook:
        primary:
          method: POST
          body: |
            {"rollout":"{{.rollout.metadata.name}}","namespace":"{{.rollout.metadata.namespace}}","phase":"{{.rollout.status.phase}}","event":"aborted"}
  triggers:
    trigger.on-rollout-completed: |
      - when: rollout.status.phase == 'Healthy'
        send: [rollout-completed]
    trigger.on-rollout-aborted: |
      - when: rollout.status.phase == 'Degraded'
        send: [rollout-aborted]
  subscriptions:
    - recipients:
        - webhook:rollout-success
      triggers:
        - on-rollout-completed
    - recipients:
        - webhook:primary
      triggers:
        - on-rollout-aborted

# En kind, gardez les ressources légères.
controller:
  replicas: 1
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      # Doit correspondre à prometheusSpec.serviceMonitorSelector.matchLabels.release
      # dans kube-prometheus-stack-values.yaml pour être scrapé (même piège que
      # pour les 3 services applicatifs — cf. Annexe B du poly).
      additionalLabels:
        release: kps
