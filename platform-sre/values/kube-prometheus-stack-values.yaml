# Values du chart kube-prometheus-stack pour le TP 3.
# Référence : https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack
#
# Ce fichier est volontairement minimaliste. Tweakez-le étape 3.

fullnameOverride: kps

# ---- Grafana ----
grafana:
  enabled: true
  # Mot de passe admin lu depuis un Secret créé hors-Git (kubectl create secret,
  # cf. RAPPORT.md étape 3) — jamais en clair ici. Le Secret doit exister dans
  # le namespace monitoring AVANT la première synchro du pod Grafana.
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password
  defaultDashboardsTimezone: browser
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.devhub.local
    path: /
  # Auto-discovery des dashboards posés en ConfigMap avec le label `grafana_dashboard=1`.
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"

# ---- Prometheus ----
prometheus:
  enabled: true
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - prometheus.devhub.local
    paths:
      - /
  prometheusSpec:
    # Rétention courte pour le TP — adaptez si vous gardez le cluster longtemps.
    retention: 15d
    # En kind 2 nœuds, EmptyDir est suffisant pour un TP (cf. défi bonus non
    # traité : PVC nécessaire en prod pour survivre à un redémarrage de pod).
    storageSpec: {}
    # Sélectionne TOUS les ServiceMonitor portant le label `release: kps`,
    # quel que soit leur namespace. C'est l'option la plus permissive,
    # utile en TP.
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector:
      matchLabels:
        release: kps
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    ruleSelector:
      matchLabels:
        release: kps

# ---- Alertmanager ----
alertmanager:
  enabled: true
  # Étape 10 : route severity:page vers un webhook primaire (réveille),
  # severity:ticket vers un webhook secondaire différent (attend lundi).
  # Webhooks mockés localement (platform-sre/alerting/webhook-mock.yaml) —
  # équivalent de webhook.site, sans dépendance à un compte externe.
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: default-null
      group_by: ["alertname", "service"]
      group_wait: 30s
      group_interval: 5m
      # Piège du poly (Annexe B) : sans repeat_interval, une alerte qui
      # reste firing est resignalée toutes les 4h par défaut — mauvais
      # réglage pour du "page" (trop rare) comme pour du "ticket" (spam si
      # trop court). Différencié explicitement par route ci-dessous.
      repeat_interval: 4h
      routes:
        - matchers:
            - severity = "page"
          receiver: primary-webhook
          repeat_interval: 1h
        - matchers:
            - severity = "ticket"
          receiver: secondary-webhook
          repeat_interval: 12h
    receivers:
      - name: default-null
      - name: primary-webhook
        webhook_configs:
          - url: http://webhook-mock.monitoring.svc.cluster.local:8080/primary
            send_resolved: true
      - name: secondary-webhook
        webhook_configs:
          - url: http://webhook-mock.monitoring.svc.cluster.local:8080/secondary
            send_resolved: true

# ---- Sous-charts à désactiver sur kind ----
# Kind ne fournit pas les endpoints standards de la control plane.
# Laissez à false sinon Prometheus aura des cibles DOWN en permanence.
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false
# coreDns pose un Service + ServiceMonitor dans kube-system par défaut — hors
# du clusterResourceWhitelist/destinations volontairement restreints de notre
# AppProject (on ne veut pas qu'une Application gère des ressources dans
# kube-system). Désactivé pour la même raison que les 4 ci-dessus.
coreDns:
  enabled: false

# ---- Operator ----
# Suggestion initiale du squelette (patch.enabled/enabled: false) écrite pour
# une version plus ancienne du chart. Sur la 87.15.1 réellement installée
# (vérifiée 2026-07-11), désactiver purement et simplement les admission
# webhooks laisse le Deployment de l'operator monter un volume Secret
# "kps-admission" que plus personne ne crée → pod bloqué en
# ContainerCreating indéfiniment. La configuration supportée sans
# cert-manager sur un cluster kind est de garder les admission webhooks
# activés et de laisser le Job de patch générer lui-même un certificat
# auto-signé au premier install.
prometheusOperator:
  admissionWebhooks:
    enabled: true
    patch:
      enabled: true
