# Application ArgoCD : planning-dev
#
# Déploie le chart Helm de services/planning/chart dans le namespace devhub-dev.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: planning-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: devhub

  source:
    repoURL: https://github.com/chesaad/pulse-campus.git
    targetRevision: main
    path: services/planning/chart
    helm:
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: devhub-dev

  # Même raison que sur annuaire-dev : planning passera en Rollout blueGreen
  # (étape 8), dont le contrôleur patche aussi dynamiquement les sélecteurs
  # de Service (activeService/previewService).
  ignoreDifferences:
    - group: ""
      kind: Service
      jsonPointers:
        - /spec/selector

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
