# Application ArgoCD : annuaire-dev
#
# Déploie le chart Helm de services/annuaire/chart dans le namespace devhub-dev.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: annuaire-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: devhub

  source:
    repoURL: https://github.com/chesaad/pulse-campus.git
    targetRevision: main
    path: services/annuaire/chart
    helm:
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: devhub-dev

  # Argo Rollouts patche dynamiquement le sélecteur des Services stable/canary
  # (ajout du label rollouts-pod-template-hash) pour router vers le bon
  # ReplicaSet — un champ que Git ne peut pas connaître à l'avance. Sans ce
  # ignoreDifferences, l'Application reste perpétuellement OutOfSync dès
  # qu'un canary a tourné au moins une fois (documenté dans la doc officielle
  # Argo Rollouts, intégration ArgoCD).
  ignoreDifferences:
    - group: ""
      kind: Service
      jsonPointers:
        - /spec/selector

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
