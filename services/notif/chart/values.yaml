# Values par défaut du chart notif.

image:
  repository: ghcr.io/chesaad/notif
  tag: dev
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  host: notif.devhub.local
  path: /

env:
  LOG_LEVEL: info

metrics:
  # SLO p95 < 200ms (étape 1) : service le plus léger des trois, résolution fine
  # sous 0.2 pour bien voir la distribution, bucket exact à 0.2 pour le seuil.
  buckets: "0.01,0.025,0.05,0.1,0.2,0.3,0.5,1,2"
  businessEnabled: true

monitoring:
  enabled: false
  serviceMonitor:
    interval: 30s
    release: kps

useDeployment: true

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

probes:
  readiness:
    path: /readyz
    initialDelaySeconds: 2
    periodSeconds: 5
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10
