# Values par défaut du chart annuaire.
# Surchargées par values-dev.yaml selon l'environnement.

# Nom de Service stable, indépendant du nom de release ArgoCD (ex.
# "annuaire-dev") — nécessaire pour que le label Prometheus `service=`
# généré par le ServiceMonitor soit identique dans tous les environnements
# et que le PromQL service="annuaire" (étapes 1, 4, 7...) reste correct.
fullnameOverride: annuaire

image:
  repository: ghcr.io/chesaad/annuaire
  tag: dev
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  host: annuaire.devhub.local
  path: /

env:
  LOG_LEVEL: info
  # Flag utilisé par l'endpoint /break pour injecter des 500 sur un
  # pourcentage de requêtes — sert à provoquer un échec de canary (étape 7).
  # Laissé à 0 par défaut, changé ponctuellement en values-dev.yaml + commit.
  FAIL_RATE: "0"

# Métriques Prometheus — paramètres injectés au pod via variables d'environnement.
# SLO p95 < 300ms (étape 1) : le défaut a déjà un bucket exact à 0.3, conservé tel quel.
metrics:
  buckets: "0.05,0.1,0.2,0.3,0.5,1,2,5"
  businessEnabled: false

# Sera passé à true en étape 4 (ServiceMonitor activé).
monitoring:
  enabled: false
  serviceMonitor:
    interval: 30s
    # Doit correspondre au releaseName du chart kube-prometheus-stack.
    release: kps

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

probes:
  readiness:
    path: /readyz
    initialDelaySeconds: 2
    periodSeconds: 5
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10
