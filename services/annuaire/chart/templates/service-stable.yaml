{{- /*
  Service "stable" — étape 5. Même nom qu'avant la migration Rollout (donc
  l'Ingress existant n'a rien à changer), sélecteur de base identique ; c'est
  Argo Rollouts qui patchera dynamiquement ce Service pour n'inclure que le
  ReplicaSet stable (ajout runtime du label rollouts-pod-template-hash).
  Le label `release` est requis pour que le ServiceMonitor du
  kube-prometheus-stack le découvre (cf. étape 4).
*/ -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "annuaire.fullname" . }}
  labels:
    {{- include "annuaire.labels" . | nindent 4 }}
    {{- if .Values.monitoring.enabled }}
    release: {{ .Values.monitoring.serviceMonitor.release | quote }}
    {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "annuaire.selectorLabels" . | nindent 4 }}
