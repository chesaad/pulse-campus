{{- /*
  Rollout Argo Rollouts — remplace le Deployment (étape 5 du poly).
  Stratégie canary minimaliste : 3 étapes simples, pas encore d'Analysis
  (étape 7). Le traffic routing passe par ingress-nginx (trafficRouting.nginx),
  qui fait un vrai split au niveau requêtes, pas une simple approximation par
  ratio de replicas.
*/ -}}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "annuaire.fullname" . }}
  labels:
    {{- include "annuaire.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "annuaire.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "annuaire.labels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
      containers:
        - name: annuaire
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.service.targetPort | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.env.LOG_LEVEL | quote }}
            - name: METRICS_BUCKETS
              value: {{ .Values.metrics.buckets | quote }}
            - name: METRICS_BUSINESS_ENABLED
              value: {{ .Values.metrics.businessEnabled | quote }}
            - name: VERSION
              value: {{ .Chart.AppVersion | quote }}
            - name: COMMIT
              value: {{ .Values.image.tag | quote }}
            - name: FAIL_RATE
              value: {{ .Values.env.FAIL_RATE | default "0" | quote }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            capabilities:
              {{- toYaml .Values.securityContext.capabilities | nindent 14 }}
  strategy:
    canary:
      stableService: {{ include "annuaire.fullname" . }}
      canaryService: {{ include "annuaire.fullname" . }}-canary
      trafficRouting:
        nginx:
          stableIngress: {{ include "annuaire.fullname" . }}
          # Étape 9 : routage header-based pour les tests internes. Une
          # requête portant X-Beta-User: true atteint TOUJOURS le canary,
          # indépendamment du setWeight courant — le header gagne, ce n'est
          # pas additif avec le pourcentage (piège cité par le poly).
          additionalIngressAnnotations:
            canary-by-header: X-Beta-User
            canary-by-header-value: "true"
      # Étape 7 : promotion sur preuve. Le step `analysis` interroge
      # Prometheus pendant 5 minutes (2 métriques, cf. analysistemplate.yaml)
      # avant d'autoriser la suite — plus d'intervention humaine nécessaire
      # tant que le canary reste sous les seuils.
      steps:
        - setWeight: 25
        - analysis:
            templates:
              - templateName: {{ include "annuaire.fullname" . }}-canary-analysis
            args:
              - name: canary-hash
                valueFrom:
                  podTemplateHashValue: Latest
        - setWeight: 50
        - pause: { duration: 30s }
        - setWeight: 100
