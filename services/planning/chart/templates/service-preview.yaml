{{- /*
  Service "preview" — étape 8 (blueGreen). Argo Rollouts le patche pour
  pointer sur la nouvelle version pendant qu'elle tourne à pleine capacité
  en parallèle de l'ancienne, avant toute bascule de trafic utilisateur.
  Exposé par ingress-preview.yaml, joignable uniquement en interne.
*/ -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "planning.fullname" . }}-preview
  labels:
    {{- include "planning.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "planning.selectorLabels" . | nindent 4 }}
