{{- /*
  Service "active" — étape 8 (blueGreen). Même nom qu'avant la migration
  (l'Ingress existant n'a rien à changer). Argo Rollouts patchera
  dynamiquement son sélecteur pour pointer sur le ReplicaSet actif courant.
  Le label `release` est requis pour que le ServiceMonitor du
  kube-prometheus-stack le découvre (cf. étape 4).
*/ -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "planning.fullname" . }}
  labels:
    {{- include "planning.labels" . | nindent 4 }}
    {{- if .Values.monitoring.enabled }}
    release: {{ .Values.monitoring.serviceMonitor.release | quote }}
    {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "planning.selectorLabels" . | nindent 4 }}
