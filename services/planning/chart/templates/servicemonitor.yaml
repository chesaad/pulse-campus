{{- /*
  ServiceMonitor — voir le commentaire équivalent dans le chart annuaire.
*/ -}}
{{- if .Values.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "planning.fullname" . }}
  labels:
    {{- include "planning.labels" . | nindent 4 }}
    release: {{ .Values.monitoring.serviceMonitor.release | quote }}
spec:
  selector:
    matchLabels:
      {{- include "planning.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  # Nécessaire pour l'AnalysisTemplate prePromotionAnalysis (étape 8), qui
  # distingue la preview de l'active via ce label — même piège/parade que
  # pour annuaire à l'étape 7.
  podTargetLabels:
    - rollouts-pod-template-hash
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.monitoring.serviceMonitor.interval }}
{{- end }}
