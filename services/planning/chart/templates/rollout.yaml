{{- /*
  Rollout Argo Rollouts — remplace le Deployment (étape 8, blueGreen).
  Les deux versions tournent SIMULTANÉMENT à pleine capacité : coût en
  ressources double pendant la bascule, à la différence du canary qui ne
  paie que pour une fraction de replicas supplémentaires.
*/ -}}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "planning.fullname" . }}
  labels:
    {{- include "planning.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "planning.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "planning.labels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
      containers:
        - name: planning
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.service.targetPort | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.env.LOG_LEVEL | quote }}
            - name: METRICS_BUCKETS
              value: {{ .Values.metrics.buckets | quote }}
            - name: METRICS_BUSINESS_ENABLED
              value: {{ .Values.metrics.businessEnabled | quote }}
            - name: VERSION
              value: {{ .Chart.AppVersion | quote }}
            - name: COMMIT
              value: {{ .Values.image.tag | quote }}
            - name: FAIL_RATE
              value: {{ .Values.env.FAIL_RATE | default "0" | quote }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            capabilities:
              {{- toYaml .Values.securityContext.capabilities | nindent 14 }}
  strategy:
    blueGreen:
      activeService: {{ include "planning.fullname" . }}
      previewService: {{ include "planning.fullname" . }}-preview
      # Bascule automatisée (étape 8, 2e démonstration) : gatée par
      # prePromotionAnalysis, pas par un bouton manuel. autoPromotionEnabled
      # laissé à true (défaut) — c'est prePromotionAnalysis qui bloque la
      # bascule tant que la preview n'a pas prouvé sa santé pendant 2 min.
      autoPromotionEnabled: true
      prePromotionAnalysis:
        templates:
          - templateName: {{ include "planning.fullname" . }}-prepromotion-analysis
        args:
          - name: preview-hash
            valueFrom:
              podTemplateHashValue: Latest
      # L'ancienne version reste up 5 min après la bascule, pour un rollback
      # instantané (juste re-basculer activeService) sans attendre un
      # nouveau déploiement.
      scaleDownDelaySeconds: 300
